specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: VeilFactory
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # TODO: replace after deployment
      abi: VeilFactory
      startBlock: 0 # TODO: replace with deployment block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Payroll
      abis:
        - name: VeilFactory
          file: ./abis/VeilFactory.json
      eventHandlers:
        - event: PayrollCreated(indexed address,indexed address,indexed address)
          handler: handlePayrollCreated
      file: ./src/factory.ts
templates:
  - kind: ethereum
    name: VeilPayroll
    network: sepolia
    source:
      abi: VeilPayroll
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Payroll
        - Employee
        - PayrollRun
        - Deposit
        - Withdrawal
      abis:
        - name: VeilPayroll
          file: ./abis/VeilPayroll.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: EmployeeAdded(indexed address)
          handler: handleEmployeeAdded
        - event: EmployeeRemoved(indexed address)
          handler: handleEmployeeRemoved
        - event: PayrollRunCreated(indexed uint256,uint256)
          handler: handlePayrollRunCreated
        - event: PayrollRunExecuted(indexed uint256,uint256,uint256)
          handler: handlePayrollRunExecuted
        - event: TaxRateUpdated(uint64)
          handler: handleTaxRateUpdated
        - event: WithdrawRequested(indexed uint256,indexed address,uint256)
          handler: handleWithdrawRequested
        - event: WithdrawCompleted(indexed uint256,indexed address,uint256)
          handler: handleWithdrawCompleted
        - event: WithdrawFailed(indexed uint256,indexed address)
          handler: handleWithdrawFailed
      file: ./src/payroll.ts
